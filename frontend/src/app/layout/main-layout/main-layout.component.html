<div class="flex h-screen bg-slate-50 dark:bg-slate-900 overflow-hidden">
  <aside
    class="w-64 bg-white dark:bg-slate-800 border-r border-slate-200 dark:border-slate-700 flex flex-col shadow-sm z-10">
    <div class="h-16 flex items-center px-6 border-b border-slate-100 dark:border-slate-700">
      <span class="text-xl font-bold text-primary-600 dark:text-primary-400">CoopMonitor</span>
    </div>

    <div class="flex-1 overflow-y-auto py-4">
      <nav class="space-y-1 px-3">
        <a
          routerLink="/"
          routerLinkActive="bg-primary-50 text-primary-700 dark:bg-primary-900/20 dark:text-primary-400"
          [routerLinkActiveOptions]="{ exact: true }"
          class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-slate-700 dark:text-slate-300 rounded-md hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors">
          <i class="pi pi-home text-lg"></i>
          <span>Dashboard</span>
        </a>

        <a
          routerLink="/video-wall"
          routerLinkActive="bg-primary-50 text-primary-700 dark:bg-primary-900/20 dark:text-primary-400"
          class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-slate-700 dark:text-slate-300 rounded-md hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors">
          <i class="pi pi-video text-lg"></i>
          <span>Video Wall</span>
        </a>

        <div class="pt-4 pb-1 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">Logs</div>

        <a
          routerLink="/logs/mortality"
          routerLinkActive="bg-primary-50 text-primary-700 dark:bg-primary-900/20 dark:text-primary-400"
          class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-slate-700 dark:text-slate-300 rounded-md hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors">
          <i class="pi pi-exclamation-triangle text-lg"></i>
          <span>Mortality</span>
        </a>
        <a
          routerLink="/logs/feed-water"
          routerLinkActive="bg-primary-50 text-primary-700 dark:bg-primary-900/20 dark:text-primary-400"
          class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-slate-700 dark:text-slate-300 rounded-md hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors">
          <i class="pi pi-filter text-lg"></i>
          <span>Feed & Water</span>
        </a>
        <a
          routerLink="/logs/disease"
          routerLinkActive="bg-primary-50 text-primary-700 dark:bg-primary-900/20 dark:text-primary-400"
          class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-slate-700 dark:text-slate-300 rounded-md hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors">
          <i class="pi pi-heart text-lg"></i>
          <span>Disease</span>
        </a>
        <a
          routerLink="/logs/weighing"
          routerLinkActive="bg-primary-50 text-primary-700 dark:bg-primary-900/20 dark:text-primary-400"
          class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-slate-700 dark:text-slate-300 rounded-md hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors">
          <i class="pi pi-chart-bar text-lg"></i>
          <span>Weighing</span>
        </a>
        <a
          routerLink="/logs/marking"
          routerLinkActive="bg-primary-50 text-primary-700 dark:bg-primary-900/20 dark:text-primary-400"
          class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-slate-700 dark:text-slate-300 rounded-md hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors">
          <i class="pi pi-tag text-lg"></i>
          <span>Marking</span>
        </a>

        <div class="pt-4 pb-1 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">Analytics</div>

        <a
          routerLink="/reports"
          routerLinkActive="bg-primary-50 text-primary-700 dark:bg-primary-900/20 dark:text-primary-400"
          class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-slate-700 dark:text-slate-300 rounded-md hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors">
          <i class="pi pi-file text-lg"></i>
          <span>Reports</span>
        </a>

        <div class="pt-4 pb-1 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">Settings</div>

        <a
          routerLink="/users"
          routerLinkActive="bg-primary-50 text-primary-700 dark:bg-primary-900/20 dark:text-primary-400"
          class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-slate-700 dark:text-slate-300 rounded-md hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors">
          <i class="pi pi-users text-lg"></i>
          <span>Users</span>
        </a>
        <a
          routerLink="/audit"
          routerLinkActive="bg-primary-50 text-primary-700 dark:bg-primary-900/20 dark:text-primary-400"
          class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-slate-700 dark:text-slate-300 rounded-md hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors">
          <i class="pi pi-history text-lg"></i>
          <span>Audit Logs</span>
        </a>
        <a
          routerLink="/settings/status"
          routerLinkActive="bg-primary-50 text-primary-700 dark:bg-primary-900/20 dark:text-primary-400"
          class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-slate-700 dark:text-slate-300 rounded-md hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors">
          <i class="pi pi-cog text-lg"></i>
          <span>System Status</span>
        </a>
        <a
          routerLink="/houses"
          routerLinkActive="bg-primary-50 text-primary-700 dark:bg-primary-900/20 dark:text-primary-400"
          class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-slate-700 dark:text-slate-300 rounded-md hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors">
          <i class="pi pi-building text-lg"></i>
          <span>Houses</span>
        </a>
        <a
          routerLink="/personnel"
          routerLinkActive="bg-primary-50 text-primary-700 dark:bg-primary-900/20 dark:text-primary-400"
          class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-slate-700 dark:text-slate-300 rounded-md hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors">
          <i class="pi pi-id-card text-lg"></i>
          <span>Personnel</span>
        </a>
        <a
          routerLink="/feeds"
          routerLinkActive="bg-primary-50 text-primary-700 dark:bg-primary-900/20 dark:text-primary-400"
          class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-slate-700 dark:text-slate-300 rounded-md hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors">
          <i class="pi pi-list text-lg"></i>
          <span>Feeds</span>
        </a>
      </nav>
    </div>

    <div class="p-4 border-t border-slate-200 dark:border-slate-700">
      <button
        pButton
        class="w-full justify-center p-button-text p-button-danger text-sm"
        (click)="logout()">
        <i class="pi pi-sign-out mr-2"></i>
        <span>Sign Out</span>
      </button>
    </div>
  </aside>

  <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
    <header
      class="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 h-16 flex items-center justify-between px-6 shadow-sm">
      <h2 class="text-lg font-medium text-slate-800 dark:text-white">Administration</h2>
    </header>

    <div class="flex-1 overflow-auto p-6">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
