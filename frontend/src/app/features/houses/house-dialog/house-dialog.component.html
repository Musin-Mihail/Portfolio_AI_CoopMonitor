<form
  [formGroup]="form"
  (ngSubmit)="onSubmit()"
  class="flex flex-col p-6">
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-xl font-bold text-[#1A1C21] m-0">{{ title }}</h2>
    <button
      type="button"
      (click)="onCancel()"
      class="text-slate-400 hover:text-slate-600 transition-colors">
      <i class="pi pi-times text-lg"></i>
    </button>
  </div>

  <div class="flex flex-col gap-5">
    <div class="flex flex-col gap-1.5">
      <label
        for="name"
        class="text-sm font-semibold text-slate-700">
        Название
        <span class="text-red-500">*</span>
      </label>
      <input
        pInputText
        id="name"
        formControlName="name"
        placeholder="Птичник #1"
        [class.ng-invalid]="form.get('name')?.invalid && form.get('name')?.touched" />
      <small
        class="text-red-500 text-xs"
        *ngIf="form.get('name')?.hasError('required') && form.get('name')?.touched">
        Обязательное поле
      </small>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div class="flex flex-col gap-1.5">
        <label
          for="area"
          class="text-sm font-semibold text-slate-700">
          Площадь (м²)
          <span class="text-red-500">*</span>
        </label>
        <p-inputnumber
          formControlName="area"
          mode="decimal"
          inputId="area"
          [useGrouping]="false"
          styleClass="w-full" />
      </div>

      <div class="flex flex-col gap-1.5">
        <label
          for="capacity"
          class="text-sm font-semibold text-slate-700">
          Вместимость (гол.)
          <span class="text-red-500">*</span>
        </label>
        <p-inputnumber
          formControlName="capacity"
          mode="decimal"
          inputId="capacity"
          [useGrouping]="false"
          styleClass="w-full" />
      </div>
    </div>
  </div>

  <div class="flex justify-end gap-3 pt-8 border-t border-slate-50 mt-6">
    <p-button
      label="Отмена"
      severity="secondary"
      [text]="true"
      (onClick)="onCancel()" />
    <p-button
      label="Сохранить"
      type="submit"
      [disabled]="form.invalid"
      [rounded]="true"
      styleClass="px-6" />
  </div>
</form>
