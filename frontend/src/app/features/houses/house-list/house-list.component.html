<div class="flex justify-between items-center mb-6">
  <h2 class="text-lg font-medium text-slate-600">Список птичников</h2>
  <button
    (click)="openDialog()"
    class="bg-[#1A1C21] text-white px-5 py-2.5 rounded-xl text-sm font-semibold flex items-center gap-2 hover:bg-slate-800 transition-colors shadow-lg shadow-slate-200">
    <i class="pi pi-plus text-xs"></i>
    <span>Новая запись</span>
  </button>
</div>

<p-table
  [value]="dataSource()"
  [tableStyle]="{ 'min-width': '50rem' }"
  [paginator]="true"
  [rows]="10"
  stripedRows>
  <ng-template pTemplate="header">
    <tr>
      <th
        pSortableColumn="name"
        style="width: 30%">
        Name
        <p-sortIcon field="name" />
      </th>
      <th
        pSortableColumn="area"
        style="width: 25%">
        Area (m²)
        <p-sortIcon field="area" />
      </th>
      <th
        pSortableColumn="capacity"
        style="width: 25%">
        Capacity (Birds)
        <p-sortIcon field="capacity" />
      </th>
      <th style="width: 20%">Actions</th>
    </tr>
  </ng-template>

  <ng-template
    pTemplate="body"
    let-h>
    <tr>
      <td class="font-medium text-[#1A1C21]">
        {{ h.name }}
      </td>
      <td>
        <span class="bg-slate-100 text-slate-600 px-2 py-1 rounded text-sm font-medium">{{ h.area }} m²</span>
      </td>
      <td>
        <span class="text-slate-600 font-medium">
          {{ h.capacity }}
        </span>
      </td>
      <td>
        <div class="flex gap-2">
          <p-button
            icon="pi pi-pencil"
            [rounded]="true"
            [text]="true"
            severity="secondary"
            (onClick)="openDialog(h)"
            pTooltip="Edit" />

          <p-button
            icon="pi pi-trash"
            [rounded]="true"
            [text]="true"
            severity="danger"
            (onClick)="deleteHouse(h.id)"
            pTooltip="Delete" />
        </div>
      </td>
    </tr>
  </ng-template>

  <ng-template pTemplate="emptymessage">
    <tr>
      <td
        colspan="4"
        class="text-center p-4">
        No houses found.
      </td>
    </tr>
  </ng-template>
</p-table>
