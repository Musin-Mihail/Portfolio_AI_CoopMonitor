<div class="card p-6">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-semibold m-0">Houses</h1>
    <p-button
      label="Add House"
      icon="pi pi-plus"
      (onClick)="openDialog()" />
  </div>

  <p-table
    [value]="dataSource()"
    [tableStyle]="{ 'min-width': '50rem' }"
    [paginator]="true"
    [rows]="10"
    [rowsPerPageOptions]="[10, 20, 50]"
    stripedRows
    styleClass="p-datatable-sm">
    <ng-template pTemplate="header">
      <tr>
        <th
          pSortableColumn="id"
          style="width: 10%">
          ID
          <p-sortIcon field="id" />
        </th>
        <th
          pSortableColumn="name"
          style="width: 30%">
          Name
          <p-sortIcon field="name" />
        </th>
        <th
          pSortableColumn="area"
          style="width: 25%">
          Area (m²)
          <p-sortIcon field="area" />
        </th>
        <th
          pSortableColumn="capacity"
          style="width: 25%">
          Capacity
          <p-sortIcon field="capacity" />
        </th>
        <th style="width: 10%">Actions</th>
      </tr>
    </ng-template>
    <ng-template
      pTemplate="body"
      let-house>
      <tr>
        <td>{{ house.id }}</td>
        <td class="font-medium">{{ house.name }}</td>
        <td>{{ house.area }}</td>
        <td>{{ house.capacity }}</td>
        <td>
          <div class="flex gap-2">
            <p-button
              icon="pi pi-pencil"
              [rounded]="true"
              [text]="true"
              severity="secondary"
              (onClick)="openDialog(house)" />
            <p-button
              icon="pi pi-trash"
              [rounded]="true"
              [text]="true"
              severity="danger"
              (onClick)="deleteHouse(house.id)" />
          </div>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td
          colspan="5"
          class="text-center p-4">
          No houses found.
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
