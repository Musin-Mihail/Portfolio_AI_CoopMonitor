<div class="card p-6">
  <div class="flex justify-between items-center mb-6">
    <div class="flex items-center gap-4">
      <h1 class="text-2xl font-semibold m-0">Справочники</h1>
      <p-select
        [options]="masterDataOptions"
        [(ngModel)]="selectedOption"
        (onChange)="onOptionChange($event)"
        variant="filled"
        styleClass="w-64" />
    </div>
    <p-button
      label="Добавить"
      icon="pi pi-plus"
      severity="contrast" />
  </div>

  <p-table
    [value]="dataSource()"
    stripedRows>
    <ng-template pTemplate="header">
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Area</th>
        <th>Capacity</th>
      </tr>
    </ng-template>
    <ng-template
      pTemplate="body"
      let-h>
      <tr>
        <td>{{ h.id }}</td>
        <td>{{ h.name }}</td>
        <td>{{ h.area }}</td>
        <td>{{ h.capacity }}</td>
      </tr>
    </ng-template>
  </p-table>
</div>
