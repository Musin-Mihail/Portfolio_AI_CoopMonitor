<div class="container">
  <div class="header">
    <h1>Houses</h1>
    <button
      mat-flat-button
      color="primary"
      (click)="openDialog()">
      <mat-icon>add</mat-icon>
      Add House
    </button>
  </div>

  <table
    mat-table
    [dataSource]="dataSource()"
    class="mat-elevation-z8">
    <ng-container matColumnDef="id">
      <th
        mat-header-cell
        *matHeaderCellDef>
        ID
      </th>
      <td
        mat-cell
        *matCellDef="let element">
        {{ element.id }}
      </td>
    </ng-container>

    <ng-container matColumnDef="name">
      <th
        mat-header-cell
        *matHeaderCellDef>
        Name
      </th>
      <td
        mat-cell
        *matCellDef="let element">
        {{ element.name }}
      </td>
    </ng-container>

    <ng-container matColumnDef="area">
      <th
        mat-header-cell
        *matHeaderCellDef>
        Area (m²)
      </th>
      <td
        mat-cell
        *matCellDef="let element">
        {{ element.area }}
      </td>
    </ng-container>

    <ng-container matColumnDef="capacity">
      <th
        mat-header-cell
        *matHeaderCellDef>
        Capacity
      </th>
      <td
        mat-cell
        *matCellDef="let element">
        {{ element.capacity }}
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th
        mat-header-cell
        *matHeaderCellDef>
        Actions
      </th>
      <td
        mat-cell
        *matCellDef="let element">
        <button
          mat-icon-button
          color="primary"
          (click)="openDialog(element)">
          <mat-icon>edit</mat-icon>
        </button>
        <button
          mat-icon-button
          color="warn"
          (click)="deleteHouse(element.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr
      mat-header-row
      *matHeaderRowDef="displayedColumns"></tr>
    <tr
      mat-row
      *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>
