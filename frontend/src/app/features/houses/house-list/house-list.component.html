<div class="flex justify-end mb-6">
  <button
    class="bg-[#1A1C21] text-white px-5 py-2.5 rounded-xl text-sm font-semibold flex items-center gap-2 hover:bg-slate-800 transition-colors shadow-lg shadow-slate-200">
    <i class="pi pi-plus text-xs"></i>
    <span>Добавить</span>
  </button>
</div>

<p-table
  [value]="dataSource()"
  styleClass="clean-table"
  [rowHover]="true">
  <ng-template pTemplate="header">
    <tr>
      <th style="width: 3rem">
        <p-tableHeaderCheckbox />
      </th>
      <th>Name</th>
      <th>Details (Area / Cap)</th>
      <th style="width: 6rem"></th>
    </tr>
  </ng-template>
  <ng-template
    pTemplate="body"
    let-h>
    <tr class="hover:bg-slate-50/50 transition-colors">
      <td>
        <p-tableCheckbox [value]="h" />
      </td>
      <td>
        <div class="flex flex-col">
          <span class="font-semibold text-sm text-[#1A1C21]">{{ h.name }}</span>
          <span class="text-[11px] text-slate-400">ID: {{ h.id }}</span>
        </div>
      </td>
      <td>
        <div class="flex gap-4 text-sm">
          <div>
            <span class="text-slate-400 text-xs mr-1">Area:</span>
            <span class="font-medium">{{ h.area }} m²</span>
          </div>
          <div>
            <span class="text-slate-400 text-xs mr-1">Cap:</span>
            <span class="font-medium">{{ h.capacity }}</span>
          </div>
        </div>
      </td>
      <td>
        <div class="flex items-center justify-end gap-2 text-slate-400">
          <button
            class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100 hover:text-slate-600 transition-colors">
            <i class="pi pi-pencil text-sm"></i>
          </button>
        </div>
      </td>
    </tr>
  </ng-template>
</p-table>
