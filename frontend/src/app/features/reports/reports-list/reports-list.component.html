<div class="card p-6">
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
    <h1 class="text-2xl font-semibold m-0 text-slate-800 dark:text-slate-100">Reports Archive</h1>
    <div class="flex gap-2">
      <p-button
        icon="pi pi-refresh"
        (onClick)="loadReports()"
        [loading]="isLoading()"
        [rounded]="true"
        [text]="true"
        severity="secondary"
        pTooltip="Refresh List" />
      <p-button
        label="Run Daily Report"
        icon="pi pi-play"
        (onClick)="generateReport()"
        [loading]="isGenerating()"
        severity="primary" />
    </div>
  </div>

  <p-table
    [value]="dataSource()"
    [tableStyle]="{ 'min-width': '50rem' }"
    [paginator]="true"
    [rows]="10"
    [loading]="isLoading()"
    stripedRows>
    <ng-template pTemplate="header">
      <tr>
        <th
          pSortableColumn="reportDate"
          style="width: 20%">
          Report Date
          <p-sortIcon field="reportDate" />
        </th>
        <th
          pSortableColumn="reportType"
          style="width: 15%">
          Type
          <p-sortIcon field="reportType" />
        </th>
        <th
          pSortableColumn="houseName"
          style="width: 20%">
          House
          <p-sortIcon field="houseName" />
        </th>
        <th
          pSortableColumn="generatedAt"
          style="width: 20%">
          Generated At
          <p-sortIcon field="generatedAt" />
        </th>
        <th
          pSortableColumn="status"
          style="width: 10%">
          Status
          <p-sortIcon field="status" />
        </th>
        <th style="width: 15%">Actions</th>
      </tr>
    </ng-template>
    <ng-template
      pTemplate="body"
      let-report>
      <tr>
        <td>{{ report.reportDate | date: "mediumDate" }}</td>
        <td>
          <span
            class="bg-blue-50 text-blue-700 dark:bg-blue-900/30 dark:text-blue-300 px-2 py-1 rounded text-xs font-medium uppercase tracking-wider">
            {{ report.reportType }}
          </span>
        </td>
        <td>{{ report.houseName }}</td>
        <td class="text-sm text-slate-500">{{ report.generatedAt | date: "medium" }}</td>
        <td>
          <p-tag
            [value]="report.status"
            [severity]="getSeverity(report.status)"
            [rounded]="true" />
        </td>
        <td>
          <p-button
            label="View"
            icon="pi pi-eye"
            size="small"
            [text]="true"
            [disabled]="report.status !== 'Success'"
            (onClick)="viewReport(report)" />
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td
          colspan="6"
          class="text-center p-8 text-slate-500">
          No reports found.
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
