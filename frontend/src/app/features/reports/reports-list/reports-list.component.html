<div class="container">
  <div class="header">
    <h1>Reports Archive</h1>
    <div class="actions">
      <button
        mat-icon-button
        (click)="loadReports()"
        title="Refresh">
        <mat-icon>refresh</mat-icon>
      </button>
      <button
        mat-flat-button
        color="primary"
        (click)="generateReport()"
        [disabled]="isGenerating()">
        <mat-icon>play_arrow</mat-icon>
        {{ isGenerating() ? "Generating..." : "Run Daily Report" }}
      </button>
    </div>
  </div>

  <table
    mat-table
    [dataSource]="dataSource()"
    class="mat-elevation-z8">
    <ng-container matColumnDef="reportDate">
      <th
        mat-header-cell
        *matHeaderCellDef>
        Report Date
      </th>
      <td
        mat-cell
        *matCellDef="let element">
        {{ element.reportDate | date: "shortDate" }}
      </td>
    </ng-container>

    <ng-container matColumnDef="reportType">
      <th
        mat-header-cell
        *matHeaderCellDef>
        Type
      </th>
      <td
        mat-cell
        *matCellDef="let element">
        <span class="type-badge">{{ element.reportType }}</span>
      </td>
    </ng-container>

    <ng-container matColumnDef="houseName">
      <th
        mat-header-cell
        *matHeaderCellDef>
        House
      </th>
      <td
        mat-cell
        *matCellDef="let element">
        {{ element.houseName }}
      </td>
    </ng-container>

    <ng-container matColumnDef="generatedAt">
      <th
        mat-header-cell
        *matHeaderCellDef>
        Generated At
      </th>
      <td
        mat-cell
        *matCellDef="let element">
        {{ element.generatedAt | date: "medium" }}
      </td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th
        mat-header-cell
        *matHeaderCellDef>
        Status
      </th>
      <td
        mat-cell
        *matCellDef="let element">
        <span
          [style.color]="element.status === 'Success' ? 'green' : 'red'"
          style="font-weight: 500">
          {{ element.status }}
        </span>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th
        mat-header-cell
        *matHeaderCellDef>
        Actions
      </th>
      <td
        mat-cell
        *matCellDef="let element">
        <button
          mat-stroked-button
          color="primary"
          (click)="viewReport(element)"
          [disabled]="element.status !== 'Success'">
          <mat-icon>visibility</mat-icon>
          View
        </button>
      </td>
    </ng-container>

    <tr
      mat-header-row
      *matHeaderRowDef="displayedColumns"></tr>
    <tr
      mat-row
      *matRowDef="let row; columns: displayedColumns"></tr>

    <tr
      class="mat-row"
      *matNoDataRow>
      <td
        class="mat-cell"
        colspan="6"
        style="text-align: center; padding: 20px">
        No reports found.
      </td>
    </tr>
  </table>
</div>
