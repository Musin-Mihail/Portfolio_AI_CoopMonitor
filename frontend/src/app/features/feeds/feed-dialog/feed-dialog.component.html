<form
  [formGroup]="form"
  (ngSubmit)="onSubmit()"
  class="flex flex-col p-6">
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-xl font-bold text-[#1A1C21] m-0">{{ title | translate }}</h2>
    <button
      type="button"
      (click)="onCancel()"
      class="text-slate-400 hover:text-slate-600 transition-colors">
      <i class="pi pi-times text-lg"></i>
    </button>
  </div>

  <div class="flex flex-col gap-6">
    <div class="flex flex-col gap-2">
      <label
        for="name"
        class="font-medium text-slate-700">
        {{ "MD_FEEDS.NAME" | translate }}
      </label>
      <input
        pInputText
        id="name"
        formControlName="name"
        class="w-full"
        [class.ng-invalid]="form.get('name')?.invalid && form.get('name')?.touched" />
      <small
        class="text-red-500"
        *ngIf="form.get('name')?.hasError('required') && form.get('name')?.touched">
        {{ "MD_FEEDS.NAME_REQ" | translate }}
      </small>
    </div>

    <div class="flex flex-col gap-2">
      <label
        for="type"
        class="font-medium text-slate-700">
        {{ "MD_FEEDS.TYPE" | translate }}
      </label>
      <p-select
        id="type"
        formControlName="type"
        [options]="types"
        optionLabel="label"
        optionValue="value"
        [placeholder]="'COMMON.SELECT_OPTION' | translate"
        styleClass="w-full">
        <ng-template
          let-item
          pTemplate="item">
          {{ item.label | translate }}
        </ng-template>
        <ng-template
          let-item
          pTemplate="selectedItem">
          {{ item.label | translate }}
        </ng-template>
      </p-select>
      <small
        class="text-red-500"
        *ngIf="form.get('type')?.hasError('required') && form.get('type')?.touched">
        {{ "MD_FEEDS.TYPE_REQ" | translate }}
      </small>
    </div>

    <div class="flex flex-col gap-2">
      <label
        for="description"
        class="font-medium text-slate-700">
        {{ "MD_FEEDS.DESCRIPTION" | translate }}
      </label>
      <textarea
        pTextarea
        id="description"
        formControlName="description"
        rows="3"
        class="w-full"></textarea>
    </div>
  </div>

  <div class="flex justify-end gap-2 pt-8">
    <p-button
      [label]="'COMMON.CANCEL' | translate"
      severity="secondary"
      [text]="true"
      (onClick)="onCancel()" />
    <p-button
      [label]="'COMMON.SAVE' | translate"
      type="submit"
      [disabled]="form.invalid"
      [rounded]="true"
      styleClass="px-6" />
  </div>
</form>
