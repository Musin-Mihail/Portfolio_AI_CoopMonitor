<div class="flex justify-between items-center mb-6">
  <h2 class="text-lg font-medium text-slate-600">{{ "MD_FEEDS.TITLE" | translate }}</h2>
  <button
    (click)="openDialog()"
    class="bg-[#1A1C21] text-white px-5 py-2.5 rounded-xl text-sm font-semibold flex items-center gap-2 hover:bg-slate-800 transition-colors shadow-lg shadow-slate-200">
    <i class="pi pi-plus text-xs"></i>
    <span>{{ "COMMON.NEW_RECORD" | translate }}</span>
  </button>
</div>

<p-table
  [value]="dataSource()"
  [tableStyle]="{ 'min-width': '50rem' }"
  [paginator]="true"
  [rows]="10"
  stripedRows>
  <ng-template pTemplate="header">
    <tr>
      <th
        pSortableColumn="name"
        style="width: 25%">
        {{ "MD_FEEDS.NAME" | translate }}
        <p-sortIcon field="name" />
      </th>
      <th
        pSortableColumn="type"
        style="width: 25%">
        {{ "MD_FEEDS.TYPE" | translate }}
        <p-sortIcon field="type" />
      </th>
      <th style="width: 40%">{{ "MD_FEEDS.DESCRIPTION" | translate }}</th>
      <th style="width: 10%">{{ "COMMON.ACTIONS" | translate }}</th>
    </tr>
  </ng-template>
  <ng-template
    pTemplate="body"
    let-feed>
    <tr>
      <td class="font-medium">{{ feed.name }}</td>
      <td>
        <span class="bg-blue-50 text-blue-700 px-2 py-1 rounded text-sm font-medium">{{ feed.type }}</span>
      </td>
      <td class="text-slate-600">{{ feed.description }}</td>
      <td>
        <div class="flex gap-2">
          <p-button
            icon="pi pi-pencil"
            [rounded]="true"
            [text]="true"
            severity="secondary"
            (onClick)="openDialog(feed)"
            [pTooltip]="'COMMON.EDIT' | translate" />
          <p-button
            icon="pi pi-trash"
            [rounded]="true"
            [text]="true"
            severity="danger"
            (onClick)="deleteFeed(feed.id)"
            [pTooltip]="'COMMON.DELETE' | translate" />
        </div>
      </td>
    </tr>
  </ng-template>
  <ng-template pTemplate="emptymessage">
    <tr>
      <td
        colspan="4"
        class="text-center p-4">
        {{ "MD_FEEDS.NO_DATA" | translate }}
      </td>
    </tr>
  </ng-template>
</p-table>
