<div class="card p-6">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-semibold m-0">Feeds</h1>
    <p-button
      label="Add Feed"
      icon="pi pi-plus"
      (onClick)="openDialog()" />
  </div>

  <p-table
    [value]="dataSource()"
    [tableStyle]="{ 'min-width': '50rem' }"
    [paginator]="true"
    [rows]="10"
    stripedRows>
    <ng-template pTemplate="header">
      <tr>
        <th
          pSortableColumn="name"
          style="width: 25%">
          Name
          <p-sortIcon field="name" />
        </th>
        <th
          pSortableColumn="type"
          style="width: 25%">
          Type
          <p-sortIcon field="type" />
        </th>
        <th style="width: 40%">Description</th>
        <th style="width: 10%">Actions</th>
      </tr>
    </ng-template>
    <ng-template
      pTemplate="body"
      let-feed>
      <tr>
        <td class="font-medium">{{ feed.name }}</td>
        <td>
          <span class="bg-blue-50 text-blue-700 px-2 py-1 rounded text-sm font-medium">{{ feed.type }}</span>
        </td>
        <td class="text-slate-600">{{ feed.description }}</td>
        <td>
          <div class="flex gap-2">
            <p-button
              icon="pi pi-pencil"
              [rounded]="true"
              [text]="true"
              severity="secondary"
              (onClick)="openDialog(feed)" />
            <p-button
              icon="pi pi-trash"
              [rounded]="true"
              [text]="true"
              severity="danger"
              (onClick)="deleteFeed(feed.id)" />
          </div>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td
          colspan="4"
          class="text-center p-4">
          No feeds found.
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
