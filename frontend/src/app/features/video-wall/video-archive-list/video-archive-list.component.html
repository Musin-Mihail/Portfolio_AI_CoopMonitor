<div class="flex flex-col xl:flex-row gap-8 h-full min-h-0">
  <div class="flex-1 overflow-y-auto pr-2 custom-scrollbar">
    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
      <ng-container *ngFor="let item of archiveStreams()">
        <div class="bg-white rounded-[20px] shadow-sm border border-slate-100 overflow-hidden flex flex-col group p-4">
          <div class="flex justify-between mb-4">
            <span class="font-bold">{{ item.title }}</span>
            <span class="text-xs bg-slate-100 px-2 py-1 rounded">{{ item.date }}</span>
          </div>
          <div class="relative aspect-video bg-slate-800 rounded-lg overflow-hidden mb-4">
            <img
              src="https://placehold.co/600x400/333/999?text=Archive"
              class="w-full h-full object-cover opacity-80" />
            <button
              (click)="playStream(item)"
              class="absolute inset-0 m-auto w-10 h-10 bg-white rounded-full flex items-center justify-center hover:scale-110 transition">
              <i class="pi pi-play"></i>
            </button>
          </div>
          <div
            *ngIf="item.eventTag"
            class="mt-auto">
            <span class="px-2 py-1 text-[10px] font-bold uppercase rounded bg-slate-100 text-slate-600">
              {{ item.eventTag.labelKey | translate }}
            </span>
          </div>
        </div>
      </ng-container>
    </div>
  </div>
</div>
