<div class="h-full flex flex-col p-6 gap-6 bg-slate-50">
  <div class="flex justify-between items-center">
    <h1 class="text-2xl font-bold m-0 text-slate-900 font-serif">Video wall</h1>

    <div class="flex items-center gap-2">
      <div class="relative">
        <div
          (click)="toggleDropdown()"
          class="bg-white border border-slate-200 rounded-lg px-4 py-2 flex items-center gap-2 cursor-pointer shadow-sm hover:bg-slate-50 transition-colors select-none">
          <div
            class="w-2.5 h-2.5 rounded-full bg-red-500 animate-pulse"
            *ngIf="activeTab() === 'live'"></div>
          <div
            class="w-2.5 h-2.5 rounded-full bg-slate-400"
            *ngIf="activeTab() === 'archive'"></div>

          <span class="text-sm font-bold text-slate-700 min-w-[80px]">
            {{ activeTab() === "live" ? ("VIDEO_WALL.TAB_LIVE" | translate) : ("VIDEO_WALL.TAB_ARCHIVE" | translate) }}
          </span>

          <i
            class="pi pi-chevron-down text-xs text-slate-400 ml-2 transition-transform duration-200"
            [class.rotate-180]="isDropdownOpen()"></i>
        </div>

        <div
          *ngIf="isDropdownOpen()"
          class="absolute top-full right-0 mt-2 w-full min-w-[160px] bg-white border border-slate-100 rounded-lg shadow-lg py-1 z-10 flex flex-col">
          <button
            (click)="setTab('live')"
            class="px-4 py-2 text-left text-sm hover:bg-slate-50 flex items-center gap-2 transition-colors">
            <div class="w-2 h-2 rounded-full bg-red-500"></div>
            <span
              [class.font-bold]="activeTab() === 'live'"
              class="text-slate-700">
              {{ "VIDEO_WALL.TAB_LIVE" | translate }}
            </span>
          </button>

          <button
            (click)="setTab('archive')"
            class="px-4 py-2 text-left text-sm hover:bg-slate-50 flex items-center gap-2 transition-colors">
            <div class="w-2 h-2 rounded-full bg-slate-400"></div>
            <span
              [class.font-bold]="activeTab() === 'archive'"
              class="text-slate-700">
              {{ "VIDEO_WALL.TAB_ARCHIVE" | translate }}
            </span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <ng-container *ngIf="activeTab() === 'live'">
    <app-video-live class="flex-1 min-h-0"></app-video-live>
  </ng-container>

  <ng-container *ngIf="activeTab() === 'archive'">
    <app-video-archive-list class="flex-1 min-h-0"></app-video-archive-list>
  </ng-container>
</div>
