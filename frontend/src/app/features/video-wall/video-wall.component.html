<div class="h-full flex flex-col p-6 gap-6 bg-slate-50">
  <div class="flex justify-between items-center">
    <h1 class="text-2xl font-bold m-0 text-slate-900 font-serif">Video wall</h1>

    <div class="flex items-center gap-2">
      <div
        class="bg-white border border-slate-200 rounded-lg px-4 py-2 flex items-center gap-2 cursor-pointer shadow-sm hover:bg-slate-50 transition-colors">
        <div
          class="w-2.5 h-2.5 rounded-full bg-red-500 animate-pulse"
          *ngIf="activeTab() === 'live'"></div>
        <div
          class="w-2.5 h-2.5 rounded-full bg-slate-400"
          *ngIf="activeTab() === 'archive'"></div>
        <span class="text-sm font-bold text-slate-700">
          {{ activeTab() === "live" ? ("VIDEO_WALL.TAB_LIVE" | translate) : ("VIDEO_WALL.TAB_ARCHIVE" | translate) }}
        </span>
        <i class="pi pi-chevron-down text-xs text-slate-400 ml-2"></i>
      </div>

      <div class="flex bg-slate-200 rounded p-1 ml-4">
        <button
          (click)="setTab('live')"
          [class.bg-white]="activeTab() === 'live'"
          class="px-2 py-1 text-xs rounded transition-colors">
          Live
        </button>
        <button
          (click)="setTab('archive')"
          [class.bg-white]="activeTab() === 'archive'"
          class="px-2 py-1 text-xs rounded transition-colors">
          Arch
        </button>
      </div>
    </div>
  </div>

  <ng-container *ngIf="activeTab() === 'live'">
    <app-video-live class="flex-1 min-h-0"></app-video-live>
  </ng-container>

  <ng-container *ngIf="activeTab() === 'archive'">
    <app-video-archive-list class="flex-1 min-h-0"></app-video-archive-list>
  </ng-container>
</div>
