<div class="max-w-[1400px] mx-auto p-4">
  <div class="mb-6">
    <h1 class="text-2xl font-bold m-0 text-slate-800 dark:text-slate-100">Video Wall & Archive</h1>
  </div>

  <p-tabs value="0">
    <p-tablist>
      <p-tab value="0">
        <i class="pi pi-camera mr-2"></i>
        Live Streams
      </p-tab>
      <p-tab value="1">
        <i class="pi pi-database mr-2"></i>
        Archive / Storage
      </p-tab>
    </p-tablist>

    <p-tabpanels>
      <p-tabpanel value="0">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pt-4">
          <div
            *ngFor="let cam of liveStreams"
            class="bg-white dark:bg-slate-800 rounded-lg shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden flex flex-col">
            <div class="p-4 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center">
              <div class="flex items-center gap-3">
                <div
                  class="w-3 h-3 rounded-full shadow-[0_0_8px]"
                  [class.bg-green-500]="cam.status === 'Online'"
                  [class.shadow-green-500]="cam.status === 'Online'"
                  [class.bg-slate-400]="cam.status === 'Offline'"></div>
                <div>
                  <div class="font-semibold text-slate-800 dark:text-slate-100">{{ cam.name }}</div>
                  <div class="text-xs text-slate-500">{{ cam.status }}</div>
                </div>
              </div>
            </div>

            <div class="bg-black h-48 flex flex-col items-center justify-center text-slate-600">
              <i class="pi pi-video text-5xl mb-2"></i>
              <span class="font-mono text-sm tracking-widest">LIVE FEED MOCK</span>
            </div>

            <div class="p-2 flex justify-end gap-2 bg-slate-50 dark:bg-slate-900">
              <p-button
                label="Settings"
                icon="pi pi-cog"
                [text]="true"
                severity="secondary"
                size="small"
                [disabled]="true" />
              <p-button
                label="Fullscreen"
                icon="pi pi-window-maximize"
                [text]="true"
                size="small" />
            </div>
          </div>
        </div>
      </p-tabpanel>

      <p-tabpanel value="1">
        <div class="flex flex-col md:flex-row gap-6 pt-4 min-h-[500px]">
          <div class="w-full md:w-64 flex-shrink-0">
            <h3 class="text-sm font-semibold text-slate-500 uppercase tracking-wide mb-3">Buckets</h3>
            <p-listbox
              [options]="buckets"
              [(ngModel)]="selectedBucket"
              optionLabel="label"
              optionValue="value"
              (onChange)="onBucketChange($event)"
              [style]="{ width: '100%' }" />
          </div>

          <div
            class="flex-grow bg-white dark:bg-slate-800 rounded-lg shadow-sm border border-slate-200 dark:border-slate-700 flex flex-col overflow-hidden">
            <div
              *ngIf="isLoading()"
              class="p-4">
              <p-progressbar
                mode="indeterminate"
                [style]="{ height: '4px' }" />
            </div>

            <div
              *ngIf="!isLoading() && files().length === 0"
              class="flex flex-col items-center justify-center flex-grow p-10 text-slate-400">
              <i class="pi pi-folder-open text-4xl mb-4"></i>
              <p>No files found in {{ selectedBucket() }}</p>
            </div>

            <div
              *ngIf="files().length > 0"
              class="flex flex-col">
              <div
                class="px-4 py-3 bg-slate-50 dark:bg-slate-900 border-b border-slate-200 dark:border-slate-700 font-semibold text-slate-700 dark:text-slate-300">
                Files in {{ selectedBucket() }}
              </div>

              <div class="divide-y divide-slate-100 dark:divide-slate-700 overflow-y-auto max-h-[600px]">
                <div
                  *ngFor="let file of files()"
                  class="p-3 flex items-center gap-4 hover:bg-slate-50 dark:hover:bg-slate-700/30 transition-colors">
                  <div
                    class="w-10 h-10 rounded-full bg-slate-100 dark:bg-slate-700 flex items-center justify-center text-slate-500">
                    <i
                      class="pi"
                      [class.pi-video]="isPlayable(file)"
                      [class.pi-file]="!isPlayable(file)"></i>
                  </div>

                  <div class="flex-grow min-w-0">
                    <div class="font-medium text-slate-800 dark:text-slate-200 truncate">{{ file.name }}</div>
                    <div class="text-sm text-slate-500 flex gap-2">
                      <span>{{ formatSize(file.size) }}</span>
                      <span>•</span>
                      <span>{{ file.lastModified | date: "medium" }}</span>
                    </div>
                  </div>

                  <p-button
                    *ngIf="isPlayable(file)"
                    icon="pi pi-play"
                    [rounded]="true"
                    [text]="true"
                    (onClick)="playVideo(file)" />
                </div>
              </div>
            </div>
          </div>
        </div>
      </p-tabpanel>
    </p-tabpanels>
  </p-tabs>
</div>
