<div class="container">
  <div class="header">
    <h1>Weighing Records</h1>
    <div class="actions">
      <button mat-flat-button color="primary" (click)="openDialog()">
        <mat-icon>add</mat-icon> New Record
      </button>
    </div>
  </div>

  <table mat-table [dataSource]="dataSource()" class="mat-elevation-z8">
    <ng-container matColumnDef="date">
      <th mat-header-cell *matHeaderCellDef>Date</th>
      <td mat-cell *matCellDef="let element">{{ element.date | date: 'shortDate' }}</td>
    </ng-container>

    <ng-container matColumnDef="house">
      <th mat-header-cell *matHeaderCellDef>House</th>
      <td mat-cell *matCellDef="let element">{{ element.houseName }}</td>
    </ng-container>

    <ng-container matColumnDef="weight">
      <th mat-header-cell *matHeaderCellDef>Weight (g)</th>
      <td mat-cell *matCellDef="let element">
        <strong>{{ element.weightGrams }}</strong>
      </td>
    </ng-container>

    <ng-container matColumnDef="music">
      <th mat-header-cell *matHeaderCellDef>Music</th>
      <td mat-cell *matCellDef="let element">
        <mat-icon *ngIf="element.isMusicPlayed" color="primary" title="Music was played"
          >music_note</mat-icon
        >
        <span *ngIf="!element.isMusicPlayed" style="color: grey">-</span>
      </td>
    </ng-container>

    <ng-container matColumnDef="personnel">
      <th mat-header-cell *matHeaderCellDef>Responsible</th>
      <td mat-cell *matCellDef="let element">{{ element.personnelName || '-' }}</td>
    </ng-container>

    <ng-container matColumnDef="evidence">
      <th mat-header-cell *matHeaderCellDef>Evidence</th>
      <td mat-cell *matCellDef="let element">
        <a
          *ngIf="element.videoUrl"
          [href]="getDownloadUrl(element.videoUrl)"
          target="_blank"
          mat-button
          color="accent"
        >
          <mat-icon>videocam</mat-icon> View
        </a>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let element">
        <button mat-icon-button color="warn" (click)="deleteRecord(element.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

  <div *ngIf="dataSource().length === 0" class="no-records">No weighing records found.</div>
</div>
