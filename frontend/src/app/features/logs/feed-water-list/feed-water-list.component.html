<div class="flex justify-between items-center mb-6">
  <h2 class="text-lg font-medium text-slate-600">Корм и вода</h2>
  <button
    (click)="openDialog()"
    class="bg-[#1A1C21] text-white px-5 py-2.5 rounded-xl text-sm font-semibold flex items-center gap-2 hover:bg-slate-800 transition-colors shadow-lg shadow-slate-200">
    <i class="pi pi-plus text-xs"></i>
    <span>Новая запись</span>
  </button>
</div>

<p-table
  [value]="dataSource()"
  [tableStyle]="{ 'min-width': '50rem' }"
  [paginator]="true"
  [rows]="10"
  stripedRows>
  <ng-template pTemplate="header">
    <tr>
      <th
        pSortableColumn="date"
        style="width: 20%">
        Date
        <p-sortIcon field="date" />
      </th>
      <th
        pSortableColumn="houseName"
        style="width: 20%">
        House
        <p-sortIcon field="houseName" />
      </th>
      <th
        pSortableColumn="feedName"
        style="width: 20%">
        Feed
        <p-sortIcon field="feedName" />
      </th>
      <th
        pSortableColumn="feedQuantityKg"
        style="width: 15%">
        Feed (kg)
        <p-sortIcon field="feedQuantityKg" />
      </th>
      <th
        pSortableColumn="waterQuantityLiters"
        style="width: 15%">
        Water (L)
        <p-sortIcon field="waterQuantityLiters" />
      </th>
      <th style="width: 10%">Actions</th>
    </tr>
  </ng-template>
  <ng-template
    pTemplate="body"
    let-element>
    <tr>
      <td>{{ element.date | date: "shortDate" }}</td>
      <td>{{ element.houseName }}</td>
      <td>{{ element.feedName || "-" }}</td>
      <td class="font-medium text-amber-700">{{ element.feedQuantityKg }}</td>
      <td class="font-medium text-blue-600">{{ element.waterQuantityLiters }}</td>
      <td>
        <p-button
          icon="pi pi-trash"
          [rounded]="true"
          [text]="true"
          severity="danger"
          (onClick)="deleteRecord(element.id)" />
      </td>
    </tr>
  </ng-template>
  <ng-template pTemplate="emptymessage">
    <tr>
      <td
        colspan="6"
        class="text-center p-4">
        No feed & water records found.
      </td>
    </tr>
  </ng-template>
</p-table>
