<div class="container">
  <div class="header">
    <h1>Feed & Water Logs</h1>
    <button
      mat-flat-button
      color="primary"
      (click)="openDialog()">
      <mat-icon>add</mat-icon>
      Add Record
    </button>
  </div>

  <table
    mat-table
    [dataSource]="dataSource()"
    class="mat-elevation-z8">
    <ng-container matColumnDef="date">
      <th
        mat-header-cell
        *matHeaderCellDef>
        Date
      </th>
      <td
        mat-cell
        *matCellDef="let element">
        {{ element.date | date: "shortDate" }}
      </td>
    </ng-container>

    <ng-container matColumnDef="houseName">
      <th
        mat-header-cell
        *matHeaderCellDef>
        House
      </th>
      <td
        mat-cell
        *matCellDef="let element">
        {{ element.houseName }}
      </td>
    </ng-container>

    <ng-container matColumnDef="feedName">
      <th
        mat-header-cell
        *matHeaderCellDef>
        Feed
      </th>
      <td
        mat-cell
        *matCellDef="let element">
        {{ element.feedName || "-" }}
      </td>
    </ng-container>

    <ng-container matColumnDef="feedQty">
      <th
        mat-header-cell
        *matHeaderCellDef>
        Feed (kg)
      </th>
      <td
        mat-cell
        *matCellDef="let element">
        {{ element.feedQuantityKg }}
      </td>
    </ng-container>

    <ng-container matColumnDef="waterQty">
      <th
        mat-header-cell
        *matHeaderCellDef>
        Water (L)
      </th>
      <td
        mat-cell
        *matCellDef="let element">
        {{ element.waterQuantityLiters }}
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th
        mat-header-cell
        *matHeaderCellDef>
        Actions
      </th>
      <td
        mat-cell
        *matCellDef="let element">
        <button
          mat-icon-button
          color="warn"
          (click)="deleteRecord(element.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr
      mat-header-row
      *matHeaderRowDef="displayedColumns"></tr>
    <tr
      mat-row
      *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>
