<div class="container">
  <div class="header">
    <h1>Marking Records</h1>
    <div class="actions">
      <button mat-flat-button color="primary" (click)="openDialog()">
        <mat-icon>add</mat-icon> New Marking
      </button>
    </div>
  </div>

  <table mat-table [dataSource]="dataSource()" class="mat-elevation-z8">
    <ng-container matColumnDef="date">
      <th mat-header-cell *matHeaderCellDef>Date</th>
      <td mat-cell *matCellDef="let element">{{ element.date | date: 'shortDate' }}</td>
    </ng-container>

    <ng-container matColumnDef="house">
      <th mat-header-cell *matHeaderCellDef>House</th>
      <td mat-cell *matCellDef="let element">{{ element.houseName }}</td>
    </ng-container>

    <ng-container matColumnDef="age">
      <th mat-header-cell *matHeaderCellDef>Age</th>
      <td mat-cell *matCellDef="let element">{{ element.birdAgeDays }} days</td>
    </ng-container>

    <ng-container matColumnDef="type">
      <th mat-header-cell *matHeaderCellDef>Type</th>
      <td mat-cell *matCellDef="let element">
        <span class="badge" [class.tape]="element.markingType === 'TapeNumber'">
          {{ element.markingType }}
        </span>
      </td>
    </ng-container>

    <ng-container matColumnDef="details">
      <th mat-header-cell *matHeaderCellDef>Details</th>
      <td mat-cell *matCellDef="let element">
        Color: <strong>{{ element.color || '-' }}</strong
        >, Num: <strong>{{ element.ringNumber || '-' }}</strong>
      </td>
    </ng-container>

    <ng-container matColumnDef="evidence">
      <th mat-header-cell *matHeaderCellDef>Evidence</th>
      <td mat-cell *matCellDef="let element">
        <a
          *ngIf="element.attachmentUrl"
          [href]="getDownloadUrl(element.attachmentUrl)"
          target="_blank"
          mat-button
          color="accent"
        >
          <mat-icon>image</mat-icon> Photo
        </a>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let element">
        <button mat-icon-button color="warn" (click)="deleteRecord(element.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

  <div *ngIf="dataSource().length === 0" class="no-records">No marking records found.</div>
</div>
