<div class="container">
  <div class="header">
    <h1>Disease Logs</h1>
    <button
      mat-flat-button
      color="primary"
      (click)="openDialog()">
      <mat-icon>add</mat-icon>
      Add Record
    </button>
  </div>

  <table
    mat-table
    [dataSource]="dataSource()"
    class="mat-elevation-z8">
    <ng-container matColumnDef="date">
      <th
        mat-header-cell
        *matHeaderCellDef>
        Date
      </th>
      <td
        mat-cell
        *matCellDef="let element">
        {{ element.date | date: "shortDate" }}
      </td>
    </ng-container>

    <ng-container matColumnDef="houseName">
      <th
        mat-header-cell
        *matHeaderCellDef>
        House
      </th>
      <td
        mat-cell
        *matCellDef="let element">
        {{ element.houseName }}
      </td>
    </ng-container>

    <ng-container matColumnDef="diagnosis">
      <th
        mat-header-cell
        *matHeaderCellDef>
        Diagnosis
      </th>
      <td
        mat-cell
        *matCellDef="let element">
        {{ element.diagnosis }}
      </td>
    </ng-container>

    <ng-container matColumnDef="medicine">
      <th
        mat-header-cell
        *matHeaderCellDef>
        Medicine
      </th>
      <td
        mat-cell
        *matCellDef="let element">
        <span *ngIf="element.medicine">{{ element.medicine }} ({{ element.dosage }})</span>
      </td>
    </ng-container>

    <ng-container matColumnDef="photo">
      <th
        mat-header-cell
        *matHeaderCellDef>
        Photo
      </th>
      <td
        mat-cell
        *matCellDef="let element">
        <button
          *ngIf="element.attachmentUrl"
          mat-icon-button
          color="accent"
          (click)="viewPhoto(element.attachmentUrl)">
          <mat-icon>image</mat-icon>
        </button>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th
        mat-header-cell
        *matHeaderCellDef>
        Actions
      </th>
      <td
        mat-cell
        *matCellDef="let element">
        <button
          mat-icon-button
          color="warn"
          (click)="deleteRecord(element.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr
      mat-header-row
      *matHeaderRowDef="displayedColumns"></tr>
    <tr
      mat-row
      *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>
