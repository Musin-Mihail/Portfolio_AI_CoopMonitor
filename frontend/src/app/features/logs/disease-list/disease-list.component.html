<div class="card p-6">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-semibold m-0">Disease Logs</h1>
    <p-button
      label="Add Record"
      icon="pi pi-plus"
      (onClick)="openDialog()" />
  </div>

  <p-table
    [value]="dataSource()"
    [tableStyle]="{ 'min-width': '50rem' }"
    [paginator]="true"
    [rows]="10"
    stripedRows>
    <ng-template pTemplate="header">
      <tr>
        <th
          pSortableColumn="date"
          style="width: 20%">
          Date
          <p-sortIcon field="date" />
        </th>
        <th
          pSortableColumn="houseName"
          style="width: 20%">
          House
          <p-sortIcon field="houseName" />
        </th>
        <th
          pSortableColumn="diagnosis"
          style="width: 20%">
          Diagnosis
          <p-sortIcon field="diagnosis" />
        </th>
        <th style="width: 20%">Treatment</th>
        <th style="width: 10%">Photo</th>
        <th style="width: 10%">Actions</th>
      </tr>
    </ng-template>
    <ng-template
      pTemplate="body"
      let-element>
      <tr>
        <td>{{ element.date | date: "shortDate" }}</td>
        <td>{{ element.houseName }}</td>
        <td class="font-medium text-purple-700">{{ element.diagnosis }}</td>
        <td>
          <div
            *ngIf="element.medicine"
            class="flex flex-col">
            <span class="font-medium">{{ element.medicine }}</span>
            <span
              *ngIf="element.dosage"
              class="text-xs text-slate-500">
              {{ element.dosage }}
            </span>
          </div>
        </td>
        <td>
          <p-button
            *ngIf="element.attachmentUrl"
            icon="pi pi-image"
            [rounded]="true"
            [text]="true"
            severity="secondary"
            (onClick)="viewPhoto(element.attachmentUrl)"
            pTooltip="View Photo" />
        </td>
        <td>
          <p-button
            icon="pi pi-trash"
            [rounded]="true"
            [text]="true"
            severity="danger"
            (onClick)="deleteRecord(element.id)" />
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td
          colspan="6"
          class="text-center p-4">
          No disease records found.
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
