<div class="flex justify-between items-center mb-6">
  <h2 class="text-lg font-medium text-slate-600">Журнал болезней</h2>
  <button
    (click)="openDialog()"
    class="bg-[#1A1C21] text-white px-5 py-2.5 rounded-xl text-sm font-semibold flex items-center gap-2 hover:bg-slate-800 transition-colors">
    <i class="pi pi-plus text-xs"></i>
    <span>Новая запись</span>
  </button>
</div>

<p-table
  [value]="dataSource()"
  [tableStyle]="{ 'min-width': '50rem' }"
  [paginator]="true"
  [rows]="10"
  stripedRows>
  <ng-template pTemplate="header">
    <tr>
      <th pSortableColumn="date">
        Date
        <p-sortIcon field="date" />
      </th>
      <th pSortableColumn="houseName">
        House
        <p-sortIcon field="houseName" />
      </th>
      <th pSortableColumn="diagnosis">
        Diagnosis
        <p-sortIcon field="diagnosis" />
      </th>
      <th>Treatment</th>
      <th>Photo</th>
      <th style="width: 8rem">Actions</th>
    </tr>
  </ng-template>
  <ng-template
    pTemplate="body"
    let-element>
    <tr>
      <td>{{ element.date | date: "shortDate" }}</td>
      <td>{{ element.houseName }}</td>
      <td class="font-medium text-purple-700">{{ element.diagnosis }}</td>
      <td>
        <div
          *ngIf="element.medicine"
          class="flex flex-col">
          <span class="font-medium">{{ element.medicine }}</span>
          <span
            *ngIf="element.dosage"
            class="text-xs text-slate-500">
            {{ element.dosage }}
          </span>
        </div>
      </td>
      <td>
        <p-button
          *ngIf="element.attachmentUrl"
          icon="pi pi-image"
          [rounded]="true"
          [text]="true"
          severity="secondary"
          (onClick)="viewPhoto(element.attachmentUrl)" />
      </td>
      <td>
        <div class="flex gap-2">
          <p-button
            icon="pi pi-pencil"
            [rounded]="true"
            [text]="true"
            severity="secondary"
            (onClick)="openDialog(element)" />
          <p-button
            icon="pi pi-trash"
            [rounded]="true"
            [text]="true"
            severity="danger"
            (onClick)="deleteRecord(element.id)" />
        </div>
      </td>
    </tr>
  </ng-template>
</p-table>
