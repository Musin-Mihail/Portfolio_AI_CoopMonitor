<div class="flex justify-between items-center mb-6">
  <h2 class="text-lg font-medium text-slate-600">Журнал падежа</h2>
  <button
    (click)="openDialog()"
    class="bg-[#1A1C21] text-white px-5 py-2.5 rounded-xl text-sm font-semibold flex items-center gap-2 hover:bg-slate-800 transition-colors shadow-lg shadow-slate-200">
    <i class="pi pi-plus text-xs"></i>
    <span>Новая запись</span>
  </button>
</div>

<p-table
  [value]="dataSource()"
  styleClass="clean-table"
  [rowHover]="true"
  [paginator]="true"
  [rows]="10">
  <ng-template pTemplate="header">
    <tr>
      <th style="width: 3rem">
        <p-tableHeaderCheckbox />
      </th>
      <th pSortableColumn="date">
        Date
        <p-sortIcon field="date" />
      </th>
      <th pSortableColumn="houseName">
        House
        <p-sortIcon field="houseName" />
      </th>
      <th pSortableColumn="quantity">
        Qty
        <p-sortIcon field="quantity" />
      </th>
      <th>Reason</th>
      <th>Photo</th>
      <th style="width: 6rem"></th>
    </tr>
  </ng-template>
  <ng-template
    pTemplate="body"
    let-element>
    <tr class="hover:bg-slate-50/50 transition-colors">
      <td>
        <p-tableCheckbox [value]="element" />
      </td>
      <td class="font-medium text-[#1A1C21]">
        {{ element.date | date: "shortDate" }}
      </td>
      <td class="text-sm text-slate-600">
        {{ element.houseName }}
      </td>
      <td>
        <span class="font-bold text-red-600 bg-red-50 px-2 py-1 rounded text-xs">-{{ element.quantity }}</span>
      </td>
      <td class="text-sm text-slate-500">
        {{ element.reason || "—" }}
      </td>
      <td>
        <p-button
          *ngIf="element.attachmentUrl"
          icon="pi pi-image"
          [text]="true"
          severity="secondary"
          styleClass="w-8 h-8 !p-0"
          (onClick)="viewPhoto(element.attachmentUrl)" />
      </td>
      <td>
        <div class="flex items-center justify-end gap-2 text-slate-400">
          <button
            class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-red-50 hover:text-red-500 transition-colors"
            (click)="deleteRecord(element.id)">
            <i class="pi pi-trash text-sm"></i>
          </button>
        </div>
      </td>
    </tr>
  </ng-template>
</p-table>
