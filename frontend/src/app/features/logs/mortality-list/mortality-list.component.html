<div class="card p-6">
  <div class="flex justify-between items-center mb-6">
    <div class="flex items-center gap-4">
      <h1 class="text-2xl font-semibold m-0">Журналы</h1>
      <p-select
        [options]="logOptions"
        [(ngModel)]="selectedLog"
        (onChange)="onLogChange($event)"
        variant="filled"
        styleClass="w-64" />
    </div>
    <p-button
      label="Новая запись"
      icon="pi pi-plus"
      severity="contrast"
      (onClick)="openDialog()" />
  </div>

  <p-table
    [value]="dataSource()"
    [paginator]="true"
    [rows]="10"
    stripedRows>
    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="date">
          Date
          <p-sortIcon field="date" />
        </th>
        <th pSortableColumn="houseName">
          House
          <p-sortIcon field="houseName" />
        </th>
        <th pSortableColumn="quantity">
          Qty
          <p-sortIcon field="quantity" />
        </th>
        <th>Reason</th>
        <th>Photo</th>
        <th>Actions</th>
      </tr>
    </ng-template>
    <ng-template
      pTemplate="body"
      let-element>
      <tr>
        <td>{{ element.date | date: "shortDate" }}</td>
        <td>{{ element.houseName }}</td>
        <td class="font-bold text-red-600">{{ element.quantity }}</td>
        <td>{{ element.reason || "-" }}</td>
        <td>
          <p-button
            *ngIf="element.attachmentUrl"
            icon="pi pi-image"
            [text]="true"
            (onClick)="viewPhoto(element.attachmentUrl)" />
        </td>
        <td>
          <p-button
            icon="pi pi-trash"
            [text]="true"
            severity="danger"
            (onClick)="deleteRecord(element.id)" />
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
