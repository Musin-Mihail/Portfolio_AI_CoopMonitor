<div class="card p-6">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-semibold m-0">Mortality Logs</h1>
    <p-button
      label="Add Record"
      icon="pi pi-plus"
      (onClick)="openDialog()" />
  </div>

  <p-table
    [value]="dataSource()"
    [tableStyle]="{ 'min-width': '50rem' }"
    [paginator]="true"
    [rows]="10"
    stripedRows>
    <ng-template pTemplate="header">
      <tr>
        <th
          pSortableColumn="date"
          style="width: 20%">
          Date
          <p-sortIcon field="date" />
        </th>
        <th
          pSortableColumn="houseName"
          style="width: 20%">
          House
          <p-sortIcon field="houseName" />
        </th>
        <th
          pSortableColumn="quantity"
          style="width: 15%">
          Qty
          <p-sortIcon field="quantity" />
        </th>
        <th style="width: 25%">Reason</th>
        <th style="width: 10%">Photo</th>
        <th style="width: 10%">Actions</th>
      </tr>
    </ng-template>
    <ng-template
      pTemplate="body"
      let-element>
      <tr>
        <td>{{ element.date | date: "shortDate" }}</td>
        <td>{{ element.houseName }}</td>
        <td class="font-bold text-red-600">{{ element.quantity }}</td>
        <td>{{ element.reason || "-" }}</td>
        <td>
          <p-button
            *ngIf="element.attachmentUrl"
            icon="pi pi-image"
            [rounded]="true"
            [text]="true"
            severity="secondary"
            (onClick)="viewPhoto(element.attachmentUrl)"
            pTooltip="View Photo" />
        </td>
        <td>
          <p-button
            icon="pi pi-trash"
            [rounded]="true"
            [text]="true"
            severity="danger"
            (onClick)="deleteRecord(element.id)" />
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td
          colspan="6"
          class="text-center p-4">
          No mortality records found.
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
