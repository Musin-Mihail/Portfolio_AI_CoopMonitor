<form
  [formGroup]="form"
  (ngSubmit)="onSubmit()"
  class="flex flex-col gap-5 pt-2">
  <div class="flex flex-col gap-2">
    <label
      for="houseId"
      class="font-medium">
      House
    </label>
    <p-select
      id="houseId"
      formControlName="houseId"
      [options]="houses()"
      optionLabel="name"
      optionValue="id"
      placeholder="Select a House"
      styleClass="w-full" />
    <small
      class="text-red-500"
      *ngIf="form.get('houseId')?.hasError('required') && form.get('houseId')?.touched">
      House is required
    </small>
  </div>

  <div class="flex flex-col gap-2">
    <label
      for="personnelId"
      class="font-medium">
      Responsible Person
    </label>
    <p-select
      id="personnelId"
      formControlName="personnelId"
      [options]="personnel()"
      optionLabel="fullName"
      optionValue="id"
      placeholder="Select Responsible"
      styleClass="w-full" />
  </div>

  <div class="flex flex-col gap-2">
    <label
      for="date"
      class="font-medium">
      Date
    </label>
    <p-datepicker
      id="date"
      formControlName="date"
      dateFormat="yy-mm-dd"
      appendTo="body"
      styleClass="w-full"
      [showIcon]="true" />
  </div>

  <div class="flex flex-col gap-2">
    <label
      for="feedId"
      class="font-medium">
      Feed Type
    </label>
    <p-select
      id="feedId"
      formControlName="feedId"
      [options]="feeds()"
      optionLabel="name"
      optionValue="id"
      placeholder="Select Feed"
      styleClass="w-full" />
  </div>

  <div class="flex gap-4">
    <div class="flex-1 flex flex-col gap-2">
      <label
        for="feedQuantityKg"
        class="font-medium">
        Feed (kg)
      </label>
      <input
        pInputText
        id="feedQuantityKg"
        type="number"
        formControlName="feedQuantityKg"
        class="w-full" />
      <small
        class="text-red-500"
        *ngIf="form.get('feedQuantityKg')?.hasError('required') && form.get('feedQuantityKg')?.touched">
        Required
      </small>
    </div>

    <div class="flex-1 flex flex-col gap-2">
      <label
        for="waterQuantityLiters"
        class="font-medium">
        Water (L)
      </label>
      <input
        pInputText
        id="waterQuantityLiters"
        type="number"
        formControlName="waterQuantityLiters"
        class="w-full" />
      <small
        class="text-red-500"
        *ngIf="form.get('waterQuantityLiters')?.hasError('required') && form.get('waterQuantityLiters')?.touched">
        Required
      </small>
    </div>
  </div>

  <div class="flex justify-end gap-2 pt-4">
    <p-button
      label="Cancel"
      severity="secondary"
      [text]="true"
      (onClick)="onCancel()" />
    <p-button
      label="Save"
      type="submit"
      [disabled]="form.invalid" />
  </div>
</form>
