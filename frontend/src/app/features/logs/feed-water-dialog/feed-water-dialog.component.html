<form
  [formGroup]="form"
  (ngSubmit)="onSubmit()"
  class="flex flex-col p-6">
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-xl font-bold text-[#1A1C21] m-0">{{ title | translate }}</h2>
    <button
      type="button"
      (click)="onCancel()"
      class="text-slate-400 hover:text-slate-600 transition-colors">
      <i class="pi pi-times text-lg"></i>
    </button>
  </div>

  <div class="flex flex-col gap-5">
    <div class="flex flex-col gap-2">
      <label
        for="houseId"
        class="font-medium text-slate-700">
        {{ "COMMON.HOUSE" | translate }}
      </label>
      <p-select
        id="houseId"
        formControlName="houseId"
        [options]="houses()"
        optionLabel="name"
        optionValue="id"
        [placeholder]="'COMMON.SELECT_OPTION' | translate"
        styleClass="w-full" />
      <small
        class="text-red-500"
        *ngIf="form.get('houseId')?.hasError('required') && form.get('houseId')?.touched">
        {{ "COMMON.REQUIRED" | translate }}
      </small>
    </div>

    <div class="flex flex-col gap-2">
      <label
        for="personnelId"
        class="font-medium text-slate-700">
        {{ "COMMON.RESPONSIBLE" | translate }}
      </label>
      <p-select
        id="personnelId"
        formControlName="personnelId"
        [options]="personnel()"
        optionLabel="fullName"
        optionValue="id"
        [placeholder]="'COMMON.SELECT_OPTION' | translate"
        styleClass="w-full" />
    </div>

    <div class="flex flex-col gap-2">
      <label
        for="date"
        class="font-medium text-slate-700">
        {{ "COMMON.DATE" | translate }}
      </label>
      <p-datepicker
        id="date"
        formControlName="date"
        dateFormat="yy-mm-dd"
        appendTo="body"
        styleClass="w-full"
        [showIcon]="true" />
    </div>

    <div class="flex flex-col gap-2">
      <label
        for="feedId"
        class="font-medium text-slate-700">
        {{ "LOGS_FEED_WATER.FEED_TYPE" | translate }}
      </label>
      <p-select
        id="feedId"
        formControlName="feedId"
        [options]="feeds()"
        optionLabel="name"
        optionValue="id"
        [placeholder]="'COMMON.SELECT_OPTION' | translate"
        styleClass="w-full" />
    </div>

    <div class="flex gap-4">
      <div class="flex-1 flex flex-col gap-2">
        <label
          for="feedQuantityKg"
          class="font-medium text-slate-700">
          {{ "LOGS_FEED_WATER.FEED_KG" | translate }}
        </label>
        <input
          pInputText
          id="feedQuantityKg"
          type="number"
          formControlName="feedQuantityKg"
          class="w-full" />
        <small
          class="text-red-500"
          *ngIf="form.get('feedQuantityKg')?.hasError('required') && form.get('feedQuantityKg')?.touched">
          {{ "COMMON.REQUIRED" | translate }}
        </small>
      </div>

      <div class="flex-1 flex flex-col gap-2">
        <label
          for="waterQuantityLiters"
          class="font-medium text-slate-700">
          {{ "LOGS_FEED_WATER.WATER_L" | translate }}
        </label>
        <input
          pInputText
          id="waterQuantityLiters"
          type="number"
          formControlName="waterQuantityLiters"
          class="w-full" />
        <small
          class="text-red-500"
          *ngIf="form.get('waterQuantityLiters')?.hasError('required') && form.get('waterQuantityLiters')?.touched">
          {{ "COMMON.REQUIRED" | translate }}
        </small>
      </div>
    </div>
  </div>

  <div class="flex justify-end gap-2 pt-8">
    <p-button
      [label]="'COMMON.CANCEL' | translate"
      severity="secondary"
      [text]="true"
      (onClick)="onCancel()" />
    <p-button
      [label]="'COMMON.SAVE' | translate"
      type="submit"
      [disabled]="form.invalid"
      [rounded]="true"
      styleClass="px-6" />
  </div>
</form>
