<div class="min-h-screen flex items-center justify-center bg-slate-100 dark:bg-slate-900 p-4">
  <p-card styleClass="w-full max-w-md shadow-lg">
    <ng-template pTemplate="header">
      <div class="pt-8 text-center">
        <h1 class="text-3xl font-bold text-primary-600 dark:text-primary-400 mb-2">CoopMonitor</h1>
        <p class="text-slate-500 dark:text-slate-400">Sign in to manage your farm</p>
      </div>
    </ng-template>

    <form
      [formGroup]="loginForm"
      (ngSubmit)="onSubmit()"
      class="flex flex-col gap-6 p-2">
      <div class="flex flex-col gap-2">
        <label
          for="username"
          class="font-medium text-slate-700 dark:text-slate-300">
          Username
        </label>
        <input
          pInputText
          id="username"
          formControlName="username"
          placeholder="Enter username"
          [class.ng-invalid]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched"
          class="w-full" />
        <small
          class="text-red-500"
          *ngIf="loginForm.get('username')?.hasError('required') && loginForm.get('username')?.touched">
          Username is required
        </small>
      </div>

      <div class="flex flex-col gap-2">
        <label
          for="password"
          class="font-medium text-slate-700 dark:text-slate-300">
          Password
        </label>
        <p-password
          id="password"
          formControlName="password"
          [feedback]="false"
          [toggleMask]="true"
          placeholder="Enter password"
          styleClass="w-full"
          inputStyleClass="w-full"
          [class.ng-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"></p-password>
        <small
          class="text-red-500"
          *ngIf="loginForm.get('password')?.hasError('required') && loginForm.get('password')?.touched">
          Password is required
        </small>
      </div>

      <div
        *ngIf="errorMessage()"
        class="bg-red-50 border border-red-200 text-red-600 p-3 rounded-md text-sm text-center">
        {{ errorMessage() }}
      </div>

      <div class="pt-2">
        <p-button
          type="submit"
          label="Sign In"
          [loading]="isLoading()"
          [disabled]="loginForm.invalid || isLoading()"
          styleClass="w-full"
          size="large"></p-button>
      </div>
    </form>
  </p-card>
</div>
