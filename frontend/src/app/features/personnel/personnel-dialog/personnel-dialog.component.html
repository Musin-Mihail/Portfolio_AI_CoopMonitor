<form
  [formGroup]="form"
  (ngSubmit)="onSubmit()"
  class="flex flex-col p-6">
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-xl font-bold text-[#1A1C21] m-0">{{ title | translate }}</h2>
    <button
      type="button"
      (click)="onCancel()"
      class="text-slate-400 hover:text-slate-600 transition-colors">
      <i class="pi pi-times text-lg"></i>
    </button>
  </div>

  <div class="flex flex-col gap-6">
    <div class="flex flex-col gap-2">
      <label
        for="fullName"
        class="font-medium text-slate-700">
        {{ "MD_PERSONNEL.FULL_NAME" | translate }}
      </label>
      <input
        pInputText
        id="fullName"
        formControlName="fullName"
        class="w-full"
        [class.ng-invalid]="form.get('fullName')?.invalid && form.get('fullName')?.touched" />
      <small
        class="text-red-500"
        *ngIf="form.get('fullName')?.hasError('required') && form.get('fullName')?.touched">
        {{ "MD_PERSONNEL.NAME_REQ" | translate }}
      </small>
    </div>

    <div class="flex flex-col gap-2">
      <label
        for="jobTitle"
        class="font-medium text-slate-700">
        {{ "MD_PERSONNEL.JOB_TITLE" | translate }}
      </label>
      <input
        pInputText
        id="jobTitle"
        formControlName="jobTitle"
        class="w-full" />
    </div>

    <div class="flex flex-col gap-2">
      <label
        for="phoneNumber"
        class="font-medium text-slate-700">
        {{ "MD_PERSONNEL.PHONE" | translate }}
      </label>
      <input
        pInputText
        id="phoneNumber"
        formControlName="phoneNumber"
        class="w-full" />
    </div>

    <div class="flex flex-col gap-2">
      <label
        for="email"
        class="font-medium text-slate-700">
        {{ "MD_PERSONNEL.EMAIL" | translate }}
      </label>
      <input
        pInputText
        id="email"
        formControlName="email"
        class="w-full" />
      <small
        class="text-red-500"
        *ngIf="form.get('email')?.hasError('email')">
        {{ "ADMIN_USERS.EMAIL_INVALID" | translate }}
      </small>
    </div>

    <div
      class="flex items-center gap-2"
      *ngIf="data">
      <p-toggleswitch
        inputId="isActive"
        formControlName="isActive" />
      <label
        for="isActive"
        class="font-medium text-slate-700">
        {{ "MD_PERSONNEL.ACTIVE" | translate }}
      </label>
    </div>
  </div>

  <div class="flex justify-end gap-2 pt-8">
    <p-button
      [label]="'COMMON.CANCEL' | translate"
      severity="secondary"
      [text]="true"
      (onClick)="onCancel()" />
    <p-button
      [label]="'COMMON.SAVE' | translate"
      type="submit"
      [disabled]="form.invalid"
      [rounded]="true"
      styleClass="px-6" />
  </div>
</form>
