<div class="card p-6">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-semibold m-0">Personnel</h1>
    <p-button
      label="Add Personnel"
      icon="pi pi-plus"
      (onClick)="openDialog()" />
  </div>

  <p-table
    [value]="dataSource()"
    [tableStyle]="{ 'min-width': '50rem' }"
    [paginator]="true"
    [rows]="10"
    stripedRows>
    <ng-template pTemplate="header">
      <tr>
        <th
          pSortableColumn="fullName"
          style="width: 25%">
          Name
          <p-sortIcon field="fullName" />
        </th>
        <th
          pSortableColumn="jobTitle"
          style="width: 20%">
          Job Title
          <p-sortIcon field="jobTitle" />
        </th>
        <th style="width: 30%">Contacts</th>
        <th
          pSortableColumn="isActive"
          style="width: 15%">
          Status
          <p-sortIcon field="isActive" />
        </th>
        <th style="width: 10%">Actions</th>
      </tr>
    </ng-template>
    <ng-template
      pTemplate="body"
      let-person>
      <tr>
        <td class="font-medium">{{ person.fullName }}</td>
        <td>{{ person.jobTitle }}</td>
        <td>
          <div
            *ngIf="person.phoneNumber"
            class="flex items-center gap-2">
            <i class="pi pi-phone text-xs text-slate-500"></i>
            <span>{{ person.phoneNumber }}</span>
          </div>
          <div
            *ngIf="person.email"
            class="flex items-center gap-2 text-sm text-slate-500">
            <i class="pi pi-envelope text-xs"></i>
            <span>{{ person.email }}</span>
          </div>
        </td>
        <td>
          <p-tag
            [value]="person.isActive ? 'Active' : 'Inactive'"
            [severity]="person.isActive ? 'success' : 'danger'"
            [rounded]="true" />
        </td>
        <td>
          <div class="flex gap-2">
            <p-button
              icon="pi pi-pencil"
              [rounded]="true"
              [text]="true"
              severity="secondary"
              (onClick)="openDialog(person)" />
            <p-button
              icon="pi pi-trash"
              [rounded]="true"
              [text]="true"
              severity="danger"
              (onClick)="deletePersonnel(person.id)" />
          </div>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td
          colspan="5"
          class="text-center p-4">
          No personnel found.
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
