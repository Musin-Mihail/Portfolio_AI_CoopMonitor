<div class="h-full flex flex-col p-6">
  <h1 class="text-[32px] font-bold m-0 text-[#1A1C21] mb-8 font-serif">Справочники</h1>

  <div class="bg-white rounded-[24px] p-6 shadow-sm border border-slate-100 flex-1 flex flex-col min-h-0">
    <div class="flex justify-between items-center mb-6">
      <div class="w-64">
        <p-select
          [options]="masterDataOptions"
          [ngModel]="selectedOption()"
          (onChange)="onOptionChange($event)"
          optionLabel="label"
          optionValue="value"
          styleClass="w-full border-slate-200"
          [style]="{ 'border-radius': '12px' }" />
      </div>

      <button
        class="bg-[#1A1C21] text-white px-5 py-2.5 rounded-xl text-sm font-semibold flex items-center gap-2 hover:bg-slate-800 transition-colors shadow-lg shadow-slate-200">
        <i class="pi pi-plus text-xs"></i>
        <span>Добавить</span>
      </button>
    </div>

    <div class="flex-1 overflow-auto">
      <router-outlet />
    </div>
  </div>
</div>
