<div class="container">
  <div class="header">
    <h1>Users Management</h1>
    <button
      mat-flat-button
      color="primary"
      (click)="openDialog()">
      <mat-icon>add</mat-icon>
      Create User
    </button>
  </div>

  <table
    mat-table
    [dataSource]="dataSource()"
    class="mat-elevation-z8">
    <ng-container matColumnDef="userName">
      <th
        mat-header-cell
        *matHeaderCellDef>
        Username
      </th>
      <td
        mat-cell
        *matCellDef="let element">
        {{ element.userName }}
      </td>
    </ng-container>

    <ng-container matColumnDef="email">
      <th
        mat-header-cell
        *matHeaderCellDef>
        Email
      </th>
      <td
        mat-cell
        *matCellDef="let element">
        {{ element.email }}
      </td>
    </ng-container>

    <ng-container matColumnDef="role">
      <th
        mat-header-cell
        *matHeaderCellDef>
        Role
      </th>
      <td
        mat-cell
        *matCellDef="let element">
        <span class="role-badge">{{ element.role }}</span>
      </td>
    </ng-container>

    <ng-container matColumnDef="personnel">
      <th
        mat-header-cell
        *matHeaderCellDef>
        Linked Personnel
      </th>
      <td
        mat-cell
        *matCellDef="let element">
        <span *ngIf="element.personnelName">
          <mat-icon style="font-size: 16px; height: 16px; width: 16px; vertical-align: middle">link</mat-icon>
          {{ element.personnelName }}
        </span>
        <span
          *ngIf="!element.personnelName"
          style="color: #999; font-style: italic">
          Not linked
        </span>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th
        mat-header-cell
        *matHeaderCellDef>
        Actions
      </th>
      <td
        mat-cell
        *matCellDef="let element">
        <button
          mat-icon-button
          color="warn"
          (click)="deleteUser(element.id)"
          [disabled]="element.userName === 'admin'">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr
      mat-header-row
      *matHeaderRowDef="displayedColumns"></tr>
    <tr
      mat-row
      *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>
