<div class="flex justify-end mb-6">
  <button
    (click)="openDialog()"
    class="bg-[#1A1C21] text-white px-5 py-2.5 rounded-xl text-sm font-semibold flex items-center gap-2 hover:bg-slate-800 transition-colors shadow-lg shadow-slate-200">
    <i class="pi pi-plus text-xs"></i>
    <span>{{ "COMMON.NEW_RECORD" | translate }}</span>
  </button>
</div>

<p-table
  [value]="dataSource()"
  styleClass="clean-table"
  [rowHover]="true"
  [paginator]="true"
  [rows]="10">
  <ng-template pTemplate="header">
    <tr>
      <th style="width: 3rem"><p-tableHeaderCheckbox /></th>
      <th pSortableColumn="userName">{{ "ADMIN_USERS.USERNAME" | translate }}</th>
      <th pSortableColumn="role">{{ "ADMIN_USERS.ROLE" | translate }}</th>
      <th>{{ "ADMIN_USERS.LINKED_PERSONNEL" | translate }}</th>
      <th style="width: 8rem"></th>
    </tr>
  </ng-template>
  <ng-template
    pTemplate="body"
    let-user>
    <tr class="hover:bg-slate-50/50 transition-colors">
      <td><p-tableCheckbox [value]="user" /></td>
      <td>
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-400 shrink-0">
            <i class="pi pi-user text-lg"></i>
          </div>
          <div class="flex flex-col">
            <span class="font-semibold text-sm text-[#1A1C21]">{{ user.userName }}</span>
            <span class="text-[11px] text-slate-400">{{ user.email }}</span>
          </div>
        </div>
      </td>
      <td>
        <span
          class="px-2.5 py-1 rounded-md text-xs font-medium border"
          [class.bg-purple-50]="user.role === 'Admin'"
          [class.text-purple-700]="user.role === 'Admin'"
          [class.bg-slate-50]="user.role !== 'Admin'"
          [class.text-slate-600]="user.role !== 'Admin'">
          {{ user.role }}
        </span>
      </td>
      <td class="text-sm text-slate-600">
        {{ user.personnelName || ("ADMIN_USERS.NOT_LINKED" | translate) }}
      </td>
      <td>
        <div class="flex items-center justify-end gap-2 text-slate-400">
          <button
            class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100 hover:text-slate-800 transition-colors"
            (click)="openDialog(user)"
            [pTooltip]="'COMMON.EDIT' | translate">
            <i class="pi pi-pencil text-sm"></i>
          </button>
          <button
            class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-red-50 hover:text-red-500 transition-colors"
            (click)="deleteUser(user.id)"
            [disabled]="user.userName === 'admin'"
            [pTooltip]="'COMMON.DELETE' | translate">
            <i class="pi pi-trash text-sm"></i>
          </button>
        </div>
      </td>
    </tr>
  </ng-template>
</p-table>
