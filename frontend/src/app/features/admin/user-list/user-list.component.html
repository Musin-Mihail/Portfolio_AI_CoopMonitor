<div class="card p-6">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-semibold m-0 text-slate-800">Администрирование</h1>
    <p-button
      label="Новая запись"
      icon="pi pi-plus"
      severity="contrast"
      (onClick)="openDialog()" />
  </div>

  <div class="mb-6">
    <p-tabs value="users">
      <p-tablist>
        <p-tab
          value="alerts"
          [disabled]="true">
          Алерты
        </p-tab>
        <p-tab
          value="logs"
          (click)="onTabChange('/admin/audit')">
          Логи
        </p-tab>
        <p-tab
          value="users"
          (click)="onTabChange('/admin/users')">
          Персонал 08
        </p-tab>
      </p-tablist>
    </p-tabs>
  </div>

  <p-table
    [value]="dataSource()"
    stripedRows>
    <ng-template pTemplate="header">
      <tr>
        <th>Username</th>
        <th>Email</th>
        <th>Role</th>
        <th>Linked Personnel</th>
        <th>Actions</th>
      </tr>
    </ng-template>
    <ng-template
      pTemplate="body"
      let-user>
      <tr>
        <td class="font-medium">{{ user.userName }}</td>
        <td>{{ user.email }}</td>
        <td>
          <span class="bg-slate-100 px-2 py-1 rounded text-sm font-semibold">{{ user.role }}</span>
        </td>
        <td>{{ user.personnelName || "Not linked" }}</td>
        <td>
          <p-button
            icon="pi pi-trash"
            [text]="true"
            severity="danger"
            (onClick)="deleteUser(user.id)"
            [disabled]="user.userName === 'admin'" />
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
