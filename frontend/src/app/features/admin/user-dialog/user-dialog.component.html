<form
  [formGroup]="form"
  (ngSubmit)="onSubmit()"
  class="flex flex-col p-6">
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-xl font-bold text-[#1A1C21] m-0">{{ title | translate }}</h2>
    <button
      type="button"
      (click)="onCancel()"
      class="text-slate-400 hover:text-slate-600 transition-colors">
      <i class="pi pi-times text-lg"></i>
    </button>
  </div>

  <div class="flex flex-col gap-5">
    <div class="flex flex-col gap-2">
      <label
        for="userName"
        class="font-medium text-slate-700">
        {{ "ADMIN_USERS.USERNAME" | translate }}
      </label>
      <input
        pInputText
        id="userName"
        formControlName="userName"
        class="w-full" />
      <small
        class="text-red-500"
        *ngIf="form.get('userName')?.hasError('required') && form.get('userName')?.touched">
        {{ "AUTH.USERNAME_REQ" | translate }}
      </small>
    </div>

    <div class="flex flex-col gap-2">
      <label
        for="email"
        class="font-medium text-slate-700">
        {{ "ADMIN_USERS.EMAIL" | translate }}
      </label>
      <input
        pInputText
        type="email"
        id="email"
        formControlName="email"
        class="w-full" />
      <small
        class="text-red-500"
        *ngIf="form.get('email')?.hasError('email') && form.get('email')?.touched">
        {{ "ADMIN_USERS.EMAIL_INVALID" | translate }}
      </small>
    </div>

    <div class="flex flex-col gap-2">
      <label
        for="password"
        class="font-medium text-slate-700">
        {{ "AUTH.PASSWORD" | translate }}
        <span
          *ngIf="data"
          class="text-xs font-normal text-slate-500 ml-2">
          ({{ "ADMIN_USERS.PASS_HINT" | translate }})
        </span>
      </label>
      <p-password
        id="password"
        formControlName="password"
        [feedback]="true"
        [toggleMask]="true"
        styleClass="w-full"
        inputStyleClass="w-full" />
      <small
        class="text-red-500"
        *ngIf="form.get('password')?.hasError('required') && form.get('password')?.touched">
        {{ "AUTH.PASSWORD_REQ" | translate }}
      </small>
      <small
        class="text-red-500"
        *ngIf="form.get('password')?.hasError('minlength') && form.get('password')?.touched">
        {{ "ADMIN_USERS.PASS_MIN" | translate }}
      </small>
    </div>

    <div class="flex flex-col gap-2">
      <label
        for="role"
        class="font-medium text-slate-700">
        {{ "ADMIN_USERS.ROLE" | translate }}
      </label>
      <p-select
        id="role"
        formControlName="role"
        [options]="roles"
        optionLabel="label"
        optionValue="value"
        styleClass="w-full">
        <ng-template
          let-item
          pTemplate="item">
          {{ item.label | translate }}
        </ng-template>
        <ng-template
          let-item
          pTemplate="selectedItem">
          {{ item.label | translate }}
        </ng-template>
      </p-select>
    </div>
  </div>

  <div class="flex justify-end gap-2 pt-8">
    <p-button
      [label]="'COMMON.CANCEL' | translate"
      severity="secondary"
      [text]="true"
      (onClick)="onCancel()" />
    <p-button
      [label]="'COMMON.SAVE' | translate"
      type="submit"
      [disabled]="form.invalid"
      [rounded]="true"
      styleClass="px-6" />
  </div>
</form>
