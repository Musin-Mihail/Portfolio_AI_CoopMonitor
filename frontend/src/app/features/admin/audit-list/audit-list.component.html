<div class="card p-6">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-semibold m-0">Администрирование</h1>
    <p-button
      label="Новая запись"
      icon="pi pi-plus"
      severity="contrast"
      [disabled]="true" />
  </div>

  <div class="mb-6">
    <p-tabs value="logs">
      <p-tablist>
        <p-tab
          value="alerts"
          [disabled]="true">
          Алерты
        </p-tab>
        <p-tab
          value="logs"
          (click)="onTabChange('/admin/audit')">
          Логи
        </p-tab>
        <p-tab
          value="users"
          (click)="onTabChange('/admin/users')">
          Персонал 08
        </p-tab>
      </p-tablist>
    </p-tabs>
  </div>

  <p-table
    [value]="dataSource()"
    [paginator]="true"
    [rows]="15"
    [loading]="isLoading()"
    stripedRows>
    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="timestamp">
          Time
          <p-sortIcon field="timestamp" />
        </th>
        <th>User</th>
        <th>Action</th>
        <th>Details</th>
      </tr>
    </ng-template>
    <ng-template
      pTemplate="body"
      let-log>
      <tr>
        <td>{{ log.timestamp | date: "medium" }}</td>
        <td>
          <span class="bg-slate-100 px-2 py-1 rounded text-sm">{{ log.userName || "System" }}</span>
        </td>
        <td class="font-semibold">{{ log.action }}</td>
        <td class="text-sm text-slate-500">{{ log.details }}</td>
      </tr>
    </ng-template>
  </p-table>
</div>
