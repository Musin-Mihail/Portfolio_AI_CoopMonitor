<p-table
  [value]="dataSource()"
  [paginator]="true"
  [rows]="15"
  [loading]="isLoading()"
  stripedRows>
  <ng-template pTemplate="header">
    <tr>
      <th pSortableColumn="timestamp">
        {{ "ADMIN_AUDIT.TIME" | translate }}
        <p-sortIcon field="timestamp" />
      </th>
      <th>{{ "ADMIN_AUDIT.USER" | translate }}</th>
      <th>{{ "ADMIN_AUDIT.ACTION" | translate }}</th>
      <th>{{ "ADMIN_AUDIT.DETAILS" | translate }}</th>
    </tr>
  </ng-template>
  <ng-template
    pTemplate="body"
    let-log>
    <tr>
      <td>{{ log.timestamp | date: "medium" }}</td>
      <td>
        <span class="bg-slate-100 px-2 py-1 rounded text-sm">
          {{ log.userName || ("ADMIN_AUDIT.SYSTEM_USER" | translate) }}
        </span>
      </td>
      <td class="font-semibold">{{ log.action }}</td>
      <td class="text-sm text-slate-500">{{ log.details }}</td>
    </tr>
  </ng-template>
</p-table>
