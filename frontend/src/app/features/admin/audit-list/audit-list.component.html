<div class="container">
  <div class="header">
    <h1>System Audit Logs</h1>
    <button
      mat-icon-button
      color="primary"
      (click)="loadLogs()"
      title="Refresh">
      <mat-icon>refresh</mat-icon>
    </button>
  </div>

  <table
    mat-table
    [dataSource]="dataSource()"
    class="mat-elevation-z8">
    <ng-container matColumnDef="timestamp">
      <th
        mat-header-cell
        *matHeaderCellDef>
        Time (UTC)
      </th>
      <td
        mat-cell
        *matCellDef="let element">
        {{ element.timestamp | date: "medium" }}
      </td>
    </ng-container>

    <ng-container matColumnDef="userName">
      <th
        mat-header-cell
        *matHeaderCellDef>
        User
      </th>
      <td
        mat-cell
        *matCellDef="let element">
        <span class="user-badge">{{ element.userName || "System" }}</span>
      </td>
    </ng-container>

    <ng-container matColumnDef="action">
      <th
        mat-header-cell
        *matHeaderCellDef>
        Action
      </th>
      <td
        mat-cell
        *matCellDef="let element">
        <strong>{{ element.action }}</strong>
      </td>
    </ng-container>

    <ng-container matColumnDef="resource">
      <th
        mat-header-cell
        *matHeaderCellDef>
        Resource
      </th>
      <td
        mat-cell
        *matCellDef="let element">
        <span
          class="resource-text"
          [title]="element.resource">
          {{ element.resource | slice: 0 : 30 }}{{ element.resource?.length > 30 ? "..." : "" }}
        </span>
      </td>
    </ng-container>

    <ng-container matColumnDef="details">
      <th
        mat-header-cell
        *matHeaderCellDef>
        Details
      </th>
      <td
        mat-cell
        *matCellDef="let element">
        <span style="color: gray; font-size: 0.9em">{{ element.details }}</span>
      </td>
    </ng-container>

    <tr
      mat-header-row
      *matHeaderRowDef="displayedColumns"></tr>
    <tr
      mat-row
      *matRowDef="let row; columns: displayedColumns"></tr>

    <tr
      class="mat-row"
      *matNoDataRow>
      <td
        class="mat-cell"
        colspan="5"
        style="text-align: center; padding: 20px">
        No logs found.
      </td>
    </tr>
  </table>
</div>
