<div class="card p-6">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-semibold m-0 text-slate-800 dark:text-slate-100">System Audit Logs</h1>
    <p-button
      icon="pi pi-refresh"
      (onClick)="loadLogs()"
      [loading]="isLoading()"
      [rounded]="true"
      [text]="true"
      severity="secondary"
      pTooltip="Refresh Logs" />
  </div>

  <p-table
    [value]="dataSource()"
    [tableStyle]="{ 'min-width': '60rem' }"
    [paginator]="true"
    [rows]="15"
    [rowsPerPageOptions]="[15, 30, 50]"
    [loading]="isLoading()"
    stripedRows
    styleClass="p-datatable-sm">
    <ng-template pTemplate="header">
      <tr>
        <th
          pSortableColumn="timestamp"
          style="width: 15%">
          Time (UTC)
          <p-sortIcon field="timestamp" />
        </th>
        <th
          pSortableColumn="userName"
          style="width: 15%">
          User
          <p-sortIcon field="userName" />
        </th>
        <th
          pSortableColumn="action"
          style="width: 15%">
          Action
          <p-sortIcon field="action" />
        </th>
        <th
          pSortableColumn="resource"
          style="width: 20%">
          Resource
          <p-sortIcon field="resource" />
        </th>
        <th style="width: 35%">Details</th>
      </tr>
    </ng-template>
    <ng-template
      pTemplate="body"
      let-log>
      <tr>
        <td class="whitespace-nowrap">{{ log.timestamp | date: "medium" }}</td>
        <td>
          <span
            class="bg-slate-100 dark:bg-slate-800 px-2 py-1 rounded text-sm font-medium border border-slate-200 dark:border-slate-700">
            {{ log.userName || "System" }}
          </span>
        </td>
        <td class="font-semibold text-slate-700 dark:text-slate-300">{{ log.action }}</td>
        <td
          class="font-mono text-xs text-slate-600 dark:text-slate-400 truncate max-w-[200px]"
          [title]="log.resource">
          {{ log.resource }}
        </td>
        <td class="text-sm text-slate-500 dark:text-slate-400 break-all">
          {{ log.details }}
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td
          colspan="5"
          class="text-center p-8 text-slate-500">
          No audit logs found.
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
